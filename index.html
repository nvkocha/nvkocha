function makeDraggable(element) {
  let offsetX = 0;
  let offsetY = 0;
  let isDragging = false;

  element.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;

    element.style.zIndex = 9999; // bring to front
  });

  document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    element.style.left = (e.clientX - offsetX) + "px";
    element.style.top  = (e.clientY - offsetY) + "px";
  });

  document.addEventListener("mouseup", () => {
    isDragging = false;
  });
}

    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Custom Cursor + Custom Trail</title>

<style>
    body {
        margin: 0;
        min-height: 200vh; /* scrolling area */
        cursor: none; /* hide default cursor */
    }

    /* ---------- CUSTOM CURSOR IMAGE ---------- */
    .custom-cursor {
        position: fixed;
        width: 0px;     /* change to match your cursor image */
        height: 0px;
        pointer-events: none;
        transform: translate(-50%, -50%);
        background-image: url("https://i.imgur.com/ZxJyPQL.png"); /* ← YOUR cursor image */
        background-size: contain;
        background-repeat: no-repeat;
        z-index: 99999;
    }

    /* ---------- TRAIL IMAGE ---------- */
    .trail {
        position: absolute;
        width: 40px;  /* adjust to your image */
        height: 40px;
        pointer-events: none;
        background-image: url("https://i.imgur.com/VbthKtG.png"); /* ← YOUR trail image */
        background-size: contain;
        background-repeat: no-repeat;
        animation: fade 1s ease-out forwards;
        z-index: 9999;
    }

    /* Fade-out animation for the trail */
    @keyframes fade {
        0%   { transform: scale(1); opacity: 1; }
        100% { transform: scale(0); opacity: 0; }
    }
</style>
</head>
<body>

<!-- Custom cursor element -->
<div class="custom-cursor" id="cursor"></div>

<script>
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", (e) => {

    // ✔ pageX/pageY fixes scrolling issues
    const x = e.pageX;
    const y = e.pageY;

    // Move the custom cursor image
    cursor.style.left = x + "px";
    cursor.style.top  = y + "px";

    // Create a trail element
    const t = document.createElement("div");
    t.classList.add("trail");

    // Center the image
    t.style.left = (x - 20) + "px";
    t.style.top  = (y - 20) + "px";

    document.body.appendChild(t);

    // Remove after fade animation
    setTimeout(() => t.remove(), 900);
});
</script>

</body>
</html>
